# environ theme table. Edit and rebuild (build.ps1 copies this next to the exe).
# Any key you omit falls back to the built-in scheme of the same name, so partial
# overrides are fine. Colors are "#RRGGBB" or "#RRGGBBAA". Switch live: F1/F2/F3.

[dark]
window_bg      = "#1F1F1F"
accent         = "#4CC2FF"
header_text    = "#F3F3F3"
header_subtext = "#9D9D9D"
readonly_text  = "#6E6E6E"
dark_titlebar  = true
card          = { fill = "#2B2B2B", border = "#3D3D3D", text = "#F3F3F3", border_width = 1.0 }
header        = { fill = "#262626", border = "#3D3D3D", text = "#9D9D9D" }
row           = { fill = "#2B2B2B", border = "#2B2B2B", text = "#F3F3F3" }
row_hover     = { fill = "#313131", border = "#313131", text = "#F3F3F3" }
row_selected  = { fill = "#333333", border = "#333333", text = "#FFFFFF" }
row_dirty     = { fill = "#2B2B2B", border = "#2B2B2B", text = "#FFD479" }
row_invalid   = { fill = "#3A2323", border = "#5A2D2D", text = "#FF99A0", border_width = 1.0 }
row_duplicate = { fill = "#2B2B2B", border = "#2B2B2B", text = "#FFB454" }
caption_close_hover = { fill = "#C42B1C", text = "#FFFFFF" }

[light]
window_bg      = "#F3F3F3"
accent         = "#005FB8"
header_text    = "#1A1A1A"
header_subtext = "#616161"
readonly_text  = "#9A9A9A"
dark_titlebar  = false
card          = { fill = "#FFFFFF", border = "#E0E0E0", text = "#1A1A1A", border_width = 1.0 }
header        = { fill = "#ECECEC", border = "#E0E0E0", text = "#616161" }
row           = { fill = "#FFFFFF", border = "#FFFFFF", text = "#1A1A1A" }
row_hover     = { fill = "#F0F0F0", border = "#F0F0F0", text = "#1A1A1A" }
row_selected  = { fill = "#EAF3FB", border = "#EAF3FB", text = "#003A6E" }
row_dirty     = { fill = "#FFFFFF", border = "#FFFFFF", text = "#8A5A00" }
row_invalid   = { fill = "#FCEBEC", border = "#F1C7CB", text = "#B42330", border_width = 1.0 }
row_duplicate = { fill = "#FFFFFF", border = "#FFFFFF", text = "#9A6A00" }
caption_close_hover = { fill = "#C42B1C", text = "#FFFFFF" }

[blue]
window_bg      = "#0A2540"
accent         = "#59B0FF"
header_text    = "#EAF2FB"
header_subtext = "#8FB3D9"
readonly_text  = "#6E8FB5"
dark_titlebar  = true
card          = { fill = "#103459", border = "#1E4B7A", text = "#EAF2FB", border_width = 1.0 }
header        = { fill = "#0D2D4D", border = "#1E4B7A", text = "#8FB3D9" }
row           = { fill = "#103459", border = "#103459", text = "#EAF2FB" }
row_hover     = { fill = "#14416E", border = "#14416E", text = "#EAF2FB" }
row_selected  = { fill = "#1B4E80", border = "#1B4E80", text = "#FFFFFF" }
row_dirty     = { fill = "#103459", border = "#103459", text = "#FFD479" }
row_invalid   = { fill = "#3D1F2A", border = "#6B3040", text = "#FF9FB0", border_width = 1.0 }
row_duplicate = { fill = "#103459", border = "#103459", text = "#FFC773" }
caption_close_hover = { fill = "#C42B1C", text = "#FFFFFF" }
