# Environ — Variable Knowledge Base
# Community-maintained descriptions of common environment variables.
# PRs welcome at https://github.com/gersonkurz/environ

[variables]

# Windows system
ComSpec = "Path to the default command interpreter (cmd.exe)"
DriverData = "Directory for third-party driver data files"
NUMBER_OF_PROCESSORS = "Number of logical CPU cores"
OS = "Operating system identifier (always 'Windows_NT' on modern Windows)"
PATHEXT = "File extensions treated as executable when typed without extension"
PROCESSOR_ARCHITECTURE = "CPU architecture (AMD64, x86, ARM64)"
PROCESSOR_IDENTIFIER = "Detailed CPU identification string"
PROCESSOR_LEVEL = "CPU family number"
PROCESSOR_REVISION = "CPU model and stepping"
PSModulePath = "Search paths for PowerShell modules"
SystemDrive = "Drive letter of the Windows installation (typically C:)"
SystemRoot = "Root directory of the Windows installation (typically C:\\Windows)"
TEMP = "Directory for temporary files"
TMP = "Directory for temporary files (legacy alias for TEMP)"
USERNAME = "Name of the currently logged-in user"
USERPROFILE = "Root directory of the current user's profile"
windir = "Windows installation directory (same as SystemRoot)"
HOMEDRIVE = "Drive letter of the user's home directory"
HOMEPATH = "Path portion of the user's home directory"
LOCALAPPDATA = "Per-user application data directory (non-roaming)"
APPDATA = "Per-user application data directory (roaming)"
ProgramData = "Shared application data directory"
ProgramFiles = "Default installation directory for 64-bit programs"
"ProgramFiles(x86)" = "Default installation directory for 32-bit programs"
CommonProgramFiles = "Shared components for 64-bit programs"
PUBLIC = "Shared public user profile directory"
Path = "Semicolon-separated list of directories searched for executables"

# User environment
OneDrive = "Root directory of the user's OneDrive sync folder"
OneDriveCommercial = "Root directory of the user's OneDrive for Business sync folder"
OneDriveConsumer = "Root directory of the user's personal OneDrive sync folder"

# Development tools
GOPATH = "Go workspace directory for packages and binaries"
GOROOT = "Go installation directory"
JAVA_HOME = "Java Development Kit installation directory"
DOTNET_ROOT = "Root directory of the .NET SDK installation"
CARGO_HOME = "Rust/Cargo home directory for packages and binaries"
RUSTUP_HOME = "Rustup toolchain manager home directory"
NODE_PATH = "Additional search paths for Node.js modules"
PYTHONPATH = "Additional search paths for Python modules"
VIRTUAL_ENV = "Path to the currently active Python virtual environment"
CONDA_PREFIX = "Path to the active Conda environment"
QT_PATH = "Qt framework installation directory"
ANDROID_HOME = "Android SDK installation directory"
ANDROID_SDK_ROOT = "Android SDK root (newer alias for ANDROID_HOME)"
CMAKE_PREFIX_PATH = "Additional search paths for CMake find_package()"
VCINSTALLDIR = "Visual Studio VC tools installation directory"
INCLUDE = "Search paths for C/C++ header files (MSVC)"
LIB = "Search paths for C/C++ library files (MSVC)"
LIBPATH = "Search paths for .NET assembly references (MSVC)"

# Package managers
ChocolateyInstall = "Chocolatey package manager installation directory"
ChocolateyToolsLocation = "Directory where Chocolatey installs tool packages"
ChocolateyLastPathUpdate = "Timestamp of last PATH modification by Chocolatey"
SCOOP = "Scoop package manager installation directory"

# Git
GIT_AUTHOR_NAME = "Default author name for Git commits"
GIT_AUTHOR_EMAIL = "Default author email for Git commits"
GIT_SSH = "Path to the SSH executable used by Git"

# Docker
DOCKER_HOST = "Docker daemon connection string"
DOCKER_CERT_PATH = "Path to Docker TLS certificates"
DOCKER_TLS_VERIFY = "Enable TLS verification for Docker connections"

# .NET
DOTNET_CLI_TELEMETRY_OPTOUT = "Disable .NET CLI telemetry when set to 1"
NUGET_PACKAGES = "Directory for NuGet package cache"

# PowerShell
POWERSHELL_DISTRIBUTION_CHANNEL = "PowerShell installation source identifier"
PSExecutionPolicyPreference = "Override for PowerShell script execution policy"

# Cloud
AWS_ACCESS_KEY_ID = "AWS access key for API authentication"
AWS_SECRET_ACCESS_KEY = "AWS secret key for API authentication"
AWS_DEFAULT_REGION = "Default AWS region for CLI commands"
AZURE_CONFIG_DIR = "Azure CLI configuration directory"
GOOGLE_APPLICATION_CREDENTIALS = "Path to Google Cloud service account key file"
CLOUDSDK_ROOT_DIR = "Google Cloud SDK installation directory"

# Build tools
WIX = "WiX Toolset v3 installation directory"
NSIS_HOME = "NSIS installer installation directory"

# Autodesk
ACSetupSvcPort = "Autodesk Content Service port for downloading product content"
ACSvcPort = "Autodesk Content Service secondary communication port"

# NVIDIA
CUDA_PATH = "NVIDIA CUDA Toolkit installation directory"
CUDA_HOME = "NVIDIA CUDA Toolkit home (alias for CUDA_PATH)"

# Debugging
_NT_SYMBOL_PATH = "Search path for Windows debugging symbols (WinDbg, VS Debugger)"
_NT_SOURCE_PATH = "Search path for source files during debugging"

# Notes — editability/usage guidance, shown in the detail strip and when you try to edit a
# variable environ can't change. Name lookup is case-insensitive. The variables below are
# computed by Windows at sign-in (the "Process" group): they aren't stored in the User or
# Machine environment keys, so environ shows them read-only and explains why here.
[notes]
USERPROFILE = "Set by Windows at sign-in from your profile path and rebuilt every logon, so editing it here wouldn't stick. Relocating a profile is a separate Windows operation."
LOCALAPPDATA = "Derived from your profile at sign-in and refreshed every logon — not editable as an environment variable here."
APPDATA = "Derived from your profile at sign-in and refreshed every logon — not editable as an environment variable here."
HOMEDRIVE = "Computed from your account at sign-in; not editable as an environment variable here."
HOMEPATH = "Computed from your account at sign-in; not editable as an environment variable here."
USERNAME = "Filled in by Windows at sign-in to identify your session; read-only."
USERDOMAIN = "Filled in by Windows at sign-in to identify your session; read-only."
LOGONSERVER = "Set by Windows at sign-in to the domain controller that authenticated you; read-only."
ProgramFiles = "Mirrors a Windows system setting. Changing it means relocating the Program Files folder — OS configuration, not an env-var edit."
"ProgramFiles(x86)" = "Mirrors a Windows system setting. Changing it means relocating the Program Files folder — OS configuration, not an env-var edit."
CommonProgramFiles = "Mirrors a Windows system setting for shared program components; read-only here."
ProgramData = "Mirrors a Windows system folder setting; read-only here."
SystemRoot = "Reflects where Windows is installed. Read-only — changing it would mean reinstalling or relocating Windows."
windir = "Reflects where Windows is installed (same as SystemRoot). Read-only."
SystemDrive = "The drive Windows is installed on. Read-only — set by the OS."
PUBLIC = "Path to the shared public profile, set by Windows; read-only here."

# Classification — extra knowledge about variables, on two independent axes. Names are
# case-insensitive. Add your own under [classification] in
# %LOCALAPPDATA%\environ\knowledge.toml to override these without editing this file.
#
#   path_like / scalar  — force a variable to be treated as a semicolon-separated path-list
#                         (segment-by-segment editing) or a plain scalar, overriding the
#                         content-based heuristic.
#   folder / file       — what the value (or each path segment) points at, driving the
#                         browse affordance: a directory picker vs a file picker.
#
# [classification]
# path_like = ["MYTOOL_PATH"]   # treat as a list even with 0-1 entries
# scalar    = ["SOME_SCALAR"]   # never split, even if it looks path-like
# folder    = ["MY_WORKDIR"]    # value is a directory -> folder picker
# file      = ["MY_CONFIG"]     # value is a file -> file picker
[classification]
# PSModulePath is always a directory list, even when it currently holds a single entry.
path_like = ["PSModulePath"]
scalar = []
folder = [
    "DriverData", "SystemRoot", "windir", "TEMP", "TMP", "USERPROFILE",
    "LOCALAPPDATA", "APPDATA", "ProgramData", "ProgramFiles", "ProgramFiles(x86)",
    "CommonProgramFiles", "PUBLIC", "OneDrive", "OneDriveCommercial", "OneDriveConsumer",
    "GOPATH", "GOROOT", "JAVA_HOME", "DOTNET_ROOT", "CARGO_HOME", "RUSTUP_HOME",
    "VIRTUAL_ENV", "CONDA_PREFIX", "QT_PATH", "ANDROID_HOME", "ANDROID_SDK_ROOT",
    "VCINSTALLDIR", "ChocolateyInstall", "ChocolateyToolsLocation", "SCOOP",
    "DOCKER_CERT_PATH", "NUGET_PACKAGES", "AZURE_CONFIG_DIR", "CLOUDSDK_ROOT_DIR",
    "WIX", "NSIS_HOME", "CUDA_PATH", "CUDA_HOME",
]
file = ["ComSpec", "GIT_SSH", "GOOGLE_APPLICATION_CREDENTIALS"]
